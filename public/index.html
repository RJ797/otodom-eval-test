<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Eval — Scoring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/scoring.css?v=4" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <div>
        <h1>Image Eval</h1>
        <p class="sub">blind human scoring</p>
      </div>
    </div>

    <div class="controls">
      <div class="field">
        <input id="scorer" class="input" type="text" placeholder="Your name" autocomplete="off" />
      </div>
      <div class="field">
        <select id="runSelect" class="input"></select>
      </div>
      <label class="switch" title="Show which model produced each image">
        <input id="revealLabels" type="checkbox" />
        <span class="track"><span class="thumb"></span></span>
        <span class="switch-label">Reveal models</span>
      </label>
      <button id="summaryBtn" class="btn ghost">Summary</button>
    </div>
  </header>

  <div class="progress-wrap">
    <div id="progressBar" class="progress"><div class="bar"></div></div>
    <span id="progressText" class="progress-text"></span>
  </div>

  <main id="main" class="main">
    <div id="empty" class="empty">
      <div class="empty-icon">✦</div>
      <h2>Ready to score</h2>
      <p>Enter your name and pick a run to begin.</p>
    </div>

    <section id="card" class="card hidden">
      <aside class="reference">
        <div class="ref-sticky">
          <div class="panel-label">Reference input</div>
          <button class="img-btn" data-zoom>
            <img id="inputImg" class="ref-img" alt="reference input" />
          </button>
          <div class="prompt-box">
            <div class="panel-label">Prompt</div>
            <p id="promptText" class="prompt"></p>
          </div>
        </div>
      </aside>

      <div class="outputs" id="outputs"></div>
    </section>
  </main>

  <div id="actionbar" class="actionbar hidden">
    <button id="prevBtn" class="btn ghost">‹ Prev</button>
    <div class="action-center">
      <span id="navInfo" class="nav-info"></span>
      <span class="hint">↵ save · ← → navigate</span>
    </div>
    <button id="saveNextBtn" class="btn primary">Save &amp; next ›</button>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <img id="lightboxImg" alt="zoomed" />
  </div>

  <!-- Summary modal -->
  <div id="summaryModal" class="modal hidden">
    <div class="modal-body">
      <div class="modal-head">
        <h2>Run summary</h2>
        <button id="closeSummary" class="btn ghost">Close</button>
      </div>
      <div id="summaryContent"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/scoring.js?v=4"></script>
</body>
</html>
