<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini API Playground</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <h1>Gemini API Playground</h1>
    </div>
    <div id="keyStatus" class="key-status" title="Key is read from .env only">checking key…</div>
  </header>

  <main class="layout">
    <!-- Controls -->
    <section class="panel controls">
      <div class="tabs">
        <button class="tab active" data-mode="text">Text / Vision</button>
        <button class="tab" data-mode="image">Image generation</button>
      </div>

      <label class="field">
        <span>Model</span>
        <div class="model-row">
          <select id="modelSelect"></select>
        </div>
        <input id="modelCustom" type="text" placeholder="…or type an exact model id to override" />
      </label>

      <label class="field">
        <span>System instruction <em>(optional)</em></span>
        <textarea id="systemInstruction" rows="2" placeholder="e.g. You are a concise assistant."></textarea>
      </label>

      <label class="field">
        <span>Prompt</span>
        <textarea id="prompt" rows="6" placeholder="Type your prompt…"></textarea>
      </label>

      <label class="field">
        <span>Image input <em>(optional — vision / image editing)</em></span>
        <input id="imageInput" type="file" accept="image/*" />
        <img id="imagePreview" class="image-preview hidden" alt="selected image preview" />
      </label>

      <div class="field-grid" id="textOnlyOptions">
        <label class="field inline">
          <span>Thinking</span>
          <input id="thinking" type="checkbox" checked />
        </label>
        <label class="field">
          <span>Thinking budget <em>(-1 auto, 0 off)</em></span>
          <input id="thinkingBudget" type="number" placeholder="-1" />
        </label>
        <label class="field inline">
          <span>Include thoughts</span>
          <input id="includeThoughts" type="checkbox" checked />
        </label>
        <label class="field">
          <span>Temperature</span>
          <input id="temperature" type="number" step="0.1" min="0" max="2" placeholder="default" />
        </label>
      </div>

      <div class="field-grid hidden" id="imageOnlyOptions">
        <label class="field">
          <span>Thinking level</span>
          <select id="thinkingLevel"></select>
        </label>
        <label class="field">
          <span>Image size <em>(optional)</em></span>
          <select id="imageSize">
            <option value="">default</option>
            <option value="1K">1K</option>
            <option value="2K">2K</option>
          </select>
        </label>
        <label class="field">
          <span>Aspect ratio <em>(optional)</em></span>
          <select id="aspectRatio">
            <option value="">default</option>
            <option value="1:1">1:1</option>
            <option value="3:4">3:4</option>
            <option value="4:3">4:3</option>
            <option value="9:16">9:16</option>
            <option value="16:9">16:9</option>
          </select>
        </label>
      </div>

      <button id="runBtn" class="run">Run</button>
    </section>

    <!-- Output -->
    <section class="panel output">
      <div class="output-head">
        <h2>Response</h2>
        <div id="meta" class="meta"></div>
      </div>

      <div id="status" class="status hidden"></div>

      <details id="thoughtsBox" class="thoughts hidden">
        <summary>Thinking summary</summary>
        <pre id="thoughtsText"></pre>
      </details>

      <div id="imagesOut" class="images-out"></div>

      <pre id="responseText" class="response-text"></pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
